---
name: CI

# yamllint disable-line rule:truthy
on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch: {}

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7
        with:
          fetch-depth: 0  # Need full history for version calculation

      - name: Set up mise
        uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d  # v4.2.0

      - name: Typecheck TUI
        run: mise run typecheck:tui

      - name: Build Go app and TUI
        run: |
          # Fix git ownership for VCS stamping
          git config --global --add safe.directory "$(pwd)"

          mise run build:all

  aur-changes:
    name: Check AUR-relevant changes
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    outputs:
      app_changed: ${{ steps.changed.outputs.app_changed }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7
        with:
          fetch-depth: 0

      - name: Check changed files
        id: changed
        env:
          BEFORE_SHA: ${{ github.event.before }}
          AFTER_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail

          if [[ "$BEFORE_SHA" =~ ^0+$ ]]; then
            BEFORE_SHA="$(git rev-list --max-parents=0 "$AFTER_SHA")"
          fi

          app_changed=false
          while IFS= read -r file; do
            case "$file" in
              *.go|go.mod|go.sum|LICENSE|mise.toml|config/*|homeassistant/*|notify/*|tui/*|.scripts/version.sh|.scripts/linux/PKGBUILD|.scripts/linux/arch-package.install|.scripts/linux/go-automate-home-assistant-bridge.service)
                app_changed=true
                break
                ;;
            esac
          done < <(git diff --name-only "$BEFORE_SHA" "$AFTER_SHA")

          echo "app_changed=$app_changed" >> "$GITHUB_OUTPUT"
          if [ "$app_changed" = "true" ]; then
            echo "AUR-relevant changes detected."
          else
            echo "No AUR-relevant changes detected. Skipping AUR update."
          fi

  update-aur:
    name: Update AUR (go-automate-git)
    runs-on: ubuntu-latest
    needs:
      - build
      - aur-changes
    container:
      image: ghcr.io/timmo001/system-bridge/ci-build-arch:latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push' && needs.aur-changes.outputs.app_changed == 'true'

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7
        with:
          fetch-depth: 0  # Need full history for version calculation

      - name: Set up mise
        uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d  # v4.2.0

      - name: Test build
        run: |
          echo "Testing build to ensure it compiles..."

          # Fix git ownership for VCS stamping in container
          git config --global --add safe.directory "$(pwd)"

          mise run build

      - name: Update AUR package
        env:
          AUR_SSH_PRIVATE_KEY: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_WORKSPACE: ${{ github.workspace }}
        run: |
          # Run the update script
          chmod +x .scripts/linux/update-aur.sh

          # If running as root and builduser exists, switch to builduser
          if [ "$(id -u)" -eq 0 ] && id -u builduser >/dev/null 2>&1; then
            echo "Running as root, switching to builduser..."
            chown -R builduser:builduser "$(pwd)"
            exec sudo --preserve-env=CI,AUR_SSH_PRIVATE_KEY,GITHUB_SHA,GITHUB_WORKSPACE -u builduser -H bash ./.scripts/linux/update-aur.sh
          fi

          .scripts/linux/update-aur.sh

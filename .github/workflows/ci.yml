---
name: CI

# yamllint disable-line rule:truthy
on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch: {}

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7
        with:
          fetch-depth: 0  # Need full history for version calculation

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c  # v6
        with:
          go-version: '1.26'

      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6  # v2

      - name: Build Go app and TUI
        run: |
          # Fix git ownership for VCS stamping
          git config --global --add safe.directory "$(pwd)"

          make build_all

  update-aur:
    name: Update AUR (go-automate-git)
    runs-on: ubuntu-latest
    needs: build
    container:
      image: ghcr.io/timmo001/system-bridge/ci-build-arch:latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7
        with:
          fetch-depth: 0  # Need full history for version calculation

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c  # v6
        with:
          go-version: '1.26'

      - name: Test build
        run: |
          echo "Testing build to ensure it compiles..."

          # Fix git ownership for VCS stamping in container
          git config --global --add safe.directory "$(pwd)"

          go build -v .

      - name: Update AUR package
        env:
          AUR_SSH_PRIVATE_KEY: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_WORKSPACE: ${{ github.workspace }}
        run: |
          # Run the update script
          chmod +x .scripts/linux/update-aur.sh

          # If running as root and builduser exists, switch to builduser
          if [ "$(id -u)" -eq 0 ] && id -u builduser >/dev/null 2>&1; then
            echo "Running as root, switching to builduser..."
            chown -R builduser:builduser "$(pwd)"
            exec sudo --preserve-env=CI,AUR_SSH_PRIVATE_KEY,GITHUB_SHA,GITHUB_WORKSPACE -u builduser -H bash ./.scripts/linux/update-aur.sh
          fi

          .scripts/linux/update-aur.sh

min_version = "2025.1.0"

[tools]
go = "1.26.5"
node = "24.18.0"
bun = "1.3.14"
# pnpm 11.8.0 is installed via the npm backend: the aqua backend ships a
# broken linux asset name for this release.
"npm:pnpm" = "11.15.0"

[tasks.build]
description = "Build the Go application"
run = '''
VERSION="$(.scripts/version.sh)"
go build -v -ldflags="-X 'main.Version=$VERSION'" -o go-automate .
'''

[tasks."build:tui"]
description = "Build the TUI binary (Bun)"
dir = "tui"
run = '''
bun install
bun build src/index.ts --compile --outfile ../go-automate-tui
'''

[tasks."build:all"]
description = "Build both the Go app and the TUI"
depends = ["build", "build:tui"]

[tasks.install]
description = "Install the application with go install"
run = '''
VERSION="$(.scripts/version.sh)"
go install -v -ldflags="-X 'main.Version=$VERSION'" .
'''

[tasks.run]
description = "Build and run the application"
depends = ["build"]
run = "./go-automate"

[tasks."serve:ha-bridge"]
description = "Start the Home Assistant bridge through pitchfork"
run = "pitchfork start ha-bridge"

[tasks."serve:status"]
description = "Show pitchfork dev server status"
run = "pitchfork status"

[tasks."serve:logs"]
description = "Follow Home Assistant bridge logs"
run = "pitchfork logs -t ha-bridge"

[tasks."serve:restart"]
description = "Restart the pitchfork Home Assistant bridge"
run = "pitchfork restart ha-bridge"

[tasks."serve:stop"]
description = "Stop the pitchfork Home Assistant bridge"
run = "pitchfork stop ha-bridge"

[tasks."run:tui"]
description = "Build and run the TUI directly"
depends = ["build:tui"]
run = "./go-automate-tui"

[tasks."docs:dev"]
description = "Run the documentation dev server"
dir = "docs"
run = "pnpm install && pnpm dev"

[tasks."docs:build"]
description = "Build the documentation site"
dir = "docs"
run = "pnpm install && pnpm build"

[tasks."docs:preview"]
description = "Preview the built documentation site"
dir = "docs"
run = "pnpm install && pnpm preview"

[tasks."docs:deps"]
description = "Install documentation dependencies"
dir = "docs"
run = "pnpm install"

[tasks.test]
description = "Run Go tests"
run = "go test -v ./..."

[tasks."lint:go"]
description = "Run Go linters (fmt, vet)"
run = [
  "go fmt ./...",
  "go vet ./...",
]

[tasks."docs:lint"]
description = "Lint docs markdown with the docs ruleset"
dir = "docs"
run = "pnpm dlx markdownlint-cli --config .markdownlint.json \"**/*.md\""

[tasks."lint:all"]
description = "Run all linters (Go, docs)"
depends = ["lint:go", "docs:lint"]

[tasks."typecheck:tui"]
description = "Typecheck the TUI (tsc via the Effect language service)"
dir = "tui"
run = '''
bun install --frozen-lockfile
bun run typecheck
'''

[tasks.check]
description = "Run all linters and tests"
depends = ["lint:all", "typecheck:tui", "test"]

[tasks.clean]
description = "Remove build artifacts"
run = "rm -f go-automate go-automate-tui"

[tasks."clean:dist"]
description = "Remove the build and dist directories"
run = "rm -rf build dist"

[tasks.deps]
description = "Install all dependencies"
run = '''
go mod tidy
(cd tui && bun install)
(cd docs && pnpm install)
'''

[tasks.version]
description = "Show the version of the application"
depends = ["build"]
run = "./go-automate --version"

[tasks."package:arch"]
description = "Create the Arch Linux package"
depends = ["clean:dist", "build:all"]
run = '''
VERSION="$(.scripts/version.sh)"
export VERSION
chmod +x ./.scripts/linux/create-arch.sh
./.scripts/linux/create-arch.sh
echo "Install with: yay -U dist/go-automate-$VERSION-1-x86_64.pkg.tar.zst"
'''
